<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DMP Summary</title>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>

    <style>
      :root {
        --bg: #f6f8ff;
        --panel: #ffffff;
        --ink: #15202b;
        --muted: #5b6b7b;
        --line: #e6ecff;
        --accent: #2f6bff;
        --shadow: 0 10px 30px rgba(23, 42, 88, 0.1);
        --radius: 16px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Consolas,
          "Noto Sans Mono CJK JP", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Hiragino Kaku Gothic ProN",
          "Noto Sans JP",
          "Yu Gothic",
          "Meiryo",
          sans-serif;
        background:
          radial-gradient(
            1200px 700px at 20% -10%,
            #dfe9ff 0%,
            transparent 60%
          ),
          radial-gradient(900px 600px at 90% 0%, #dff9ff 0%, transparent 55%),
          var(--bg);
        color: var(--ink);
      }

      header {
        padding: 18px 18px 10px;
        max-width: 1280px;
        margin: 0 auto;
      }

      .title {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.3px;
      }

      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 2px;
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 10px 18px 26px;
        display: grid;
        grid-template-columns: 3fr 10px 5fr;
        gap: 0;
        align-items: stretch;
      }

      @media (max-width: 980px) {
        .wrap {
          grid-template-columns: 1fr;
        }
        .splitter {
          display: none;
        }
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        min-height: 70vh;
        display: flex;
        flex-direction: column;
      }

      .card-h {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        color: var(--ink);
        box-shadow: 0 6px 16px rgba(23, 42, 88, 0.08);
        user-select: none;
      }

      .btn.primary {
        border-color: rgba(47, 107, 255, 0.25);
        background: linear-gradient(180deg, #eaf1ff 0%, #f7fbff 100%);
        color: #0f2c92;
      }

      .btn.small {
        padding: 8px 10px;
        font-size: 12px;
        border-radius: 10px;
        box-shadow: none;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .hiddenInput {
        display: none;
      }

      .search {
        display: flex;
        gap: 10px;
        align-items: center;
        width: min(520px, 100%);
      }

      .search input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 10px 12px;
        border-radius: 12px;
        outline: none;
        background: #fbfcff;
      }

      .pill {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #fbfcff;
        white-space: nowrap;
      }

      .folderLabel {
        font-size: 13px;
        color: #243249;
        font-weight: 700;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .splitter {
        width: 10px;
        cursor: col-resize;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splitter::before {
        content: "";
        width: 4px;
        height: 65vh;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          rgba(47, 107, 255, 0.18),
          rgba(47, 107, 255, 0.04)
        );
        border: 1px solid rgba(47, 107, 255, 0.14);
      }

      .tableWrap {
        flex: 1;
        overflow: auto;
        max-height: 64vh;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead th {
        text-align: left;
        padding: 12px 14px;
        color: #22324a;
        background: #f7f9ff;
        border-bottom: 1px solid var(--line);
        user-select: none;
        cursor: pointer;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      thead th .sort {
        font-size: 11px;
        color: var(--muted);
        margin-left: 6px;
      }

      tbody td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        color: #243249;
        vertical-align: top;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover {
        background: #f3f7ff;
      }

      tbody tr.active {
        background: linear-gradient(
          90deg,
          rgba(47, 107, 255, 0.1),
          transparent 70%
        );
      }

      .mono {
        font-family: var(--mono);
      }

      .empty {
        padding: 18px 14px;
        color: var(--muted);
      }

      .detail {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
        overflow: hidden;
      }

      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      @media (max-width: 980px) {
        .meta {
          grid-template-columns: 1fr;
        }
      }

      .kv {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fbfcff;
        min-height: 56px;
      }

      .kv .k {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .kv .v {
        font-size: 13px;
        font-weight: 800;
        color: #1b2a40;
        word-break: break-word;
      }

      .tabs {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .tabBtns {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .tab {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fbfcff;
        color: #243249;
        font-weight: 800;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
      }

      .tab.active {
        border-color: rgba(47, 107, 255, 0.3);
        background: #eaf1ff;
        color: #0f2c92;
      }

      .contentBox {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #ffffff;
        overflow: auto;
        padding: 14px;
        flex: 1;
        min-height: 40vh;
      }

      .rendered {
        max-width: 100%;
        line-height: 1.75;
        font-size: 14px;
      }

      .rendered h1 {
        font-size: 20px;
        margin: 12px 0 8px;
      }

      .rendered h2 {
        font-size: 18px;
        margin: 14px 0 8px;
      }

      .rendered h3 {
        font-size: 16px;
        margin: 12px 0 6px;
      }

      .rendered p {
        margin: 10px 0;
      }

      .rendered ul,
      .rendered ol {
        margin: 10px 0 10px 22px;
      }

      .rendered li {
        margin: 6px 0;
      }

      .rendered hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 14px 0;
      }

      .rendered blockquote {
        margin: 10px 0;
        padding: 10px 12px;
        border-left: 4px solid rgba(47, 107, 255, 0.25);
        background: #f7f9ff;
        border-radius: 10px;
        color: #2b3a55;
      }

      .rendered table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13px;
      }

      .rendered th,
      .rendered td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        vertical-align: top;
      }

      .rendered code {
        font-family: var(--mono);
        background: #f3f5ff;
        border: 1px solid #e7ebff;
        padding: 0 6px;
        border-radius: 7px;
        font-size: 12px;
      }

      .rendered pre {
        background: #0f172a;
        color: #e6edf7;
        padding: 12px;
        border-radius: 12px;
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .rendered pre code {
        background: transparent;
        border: none;
        padding: 0;
        color: inherit;
        font-size: 12px;
      }

      pre.raw {
        margin: 0;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      pre.raw.nowrap {
        white-space: pre;
        word-break: normal;
      }

      .foot {
        padding: 12px 14px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="title">
        <h1>DMP Summary</h1>
        <div class="sub">
          フォルダを選択 → 自動読み込み → 一覧 → クリックで詳細（HTML/RAW）
        </div>
      </div>
    </header>

    <div class="wrap" id="wrap">
      <section class="card" id="leftCard">
        <div class="card-h">
          <div class="controls">
            <input
              id="folderInput"
              class="hiddenInput"
              type="file"
              webkitdirectory
              directory
              multiple
              accept=".md,text/markdown"
            />
            <button id="folderBtn" class="btn primary">フォルダを選択</button>
            <span id="folderName" class="folderLabel">未選択</span>
            <button id="clearBtn" class="btn">Clear</button>
          </div>

          <div class="controls search">
            <input
              id="q"
              type="search"
              placeholder="検索（ファイル名 / 作成者 / 日付 / 本文）"
            />
            <span id="countPill" class="pill">0 files</span>
          </div>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th data-key="fileName">
                  ファイル名 <span class="sort" id="sort-fileName"></span>
                </th>
                <th data-key="createdBy">
                  作成者 <span class="sort" id="sort-createdBy"></span>
                </th>
                <th data-key="createdAt">
                  作成日 <span class="sort" id="sort-createdAt"></span>
                </th>
                <th data-key="updatedAt">
                  最終更新日 <span class="sort" id="sort-updatedAt"></span>
                </th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr>
                <td colspan="4" class="empty">
                  「フォルダを選択」を押して、md
                  を含むフォルダを選んでください。
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="foot">
          <div class="pill">列ヘッダクリックで昇順/降順</div>
          <div class="pill">サブフォルダ内の .md も読めます</div>
        </div>
      </section>

      <div class="splitter" id="splitter" title="ドラッグで幅を調整"></div>

      <section class="card" id="rightCard">
        <div class="card-h">
          <div
            style="
              display: flex;
              gap: 10px;
              align-items: center;
              flex-wrap: wrap;
            "
          >
            <strong>詳細</strong>
            <span id="selectedPill" class="pill">未選択</span>
          </div>
          <div class="controls">
            <button id="copyRawBtn" class="btn small">RAWをコピー</button>
            <button id="copyHtmlBtn" class="btn small">HTMLをコピー</button>
          </div>
        </div>

        <div class="detail">
          <div class="meta">
            <div class="kv">
              <div class="k">ファイル名</div>
              <div class="v" id="m_fileName">—</div>
            </div>
            <div class="kv">
              <div class="k">作成者（createdBy）</div>
              <div class="v" id="m_createdBy">—</div>
            </div>
            <div class="kv">
              <div class="k">作成日（createdAt）</div>
              <div class="v mono" id="m_createdAt">—</div>
            </div>
            <div class="kv">
              <div class="k">最終更新日（updatedAt）</div>
              <div class="v mono" id="m_updatedAt">—</div>
            </div>
          </div>

          <div class="tabs">
            <div class="tabBtns">
              <div class="tab active" id="tabRendered">HTML（見やすく）</div>
              <div class="tab" id="tabRaw">RAW</div>
            </div>
            <div class="tabBtns">
              <button id="wrapToggleBtn" class="btn small">
                RAW折り返し：ON
              </button>
            </div>
          </div>

          <div class="contentBox" id="contentBox">
            <div class="rendered" id="renderedView"></div>
            <pre class="raw" id="rawView" style="display: none"></pre>
          </div>
        </div>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function isIsoDate(s) {
        return typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s.trim());
      }

      function dateToNumber(s) {
        if (!isIsoDate(s)) return NaN;
        return Number(s.replaceAll("-", ""));
      }

      function parseFrontMatter(mdText) {
        let text = String(mdText ?? "");
        text = text.replace(/^\uFEFF/, "");
        text = text.replace(/^\s+/, "");

        const m = text.match(/^---\s*\r?\n([\s\S]*?)\r?\n---\s*(\r?\n|$)/);
        if (!m) return { fm: null, body: text };

        const fmBlock = m[1];
        const body = text.slice(m[0].length);

        const fm = {};
        const lines = fmBlock.split(/\r?\n/);

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          if (!line.trim()) continue;

          const mm = line.match(/^([A-Za-z0-9_]+):\s*(.*)$/);
          if (!mm) continue;

          const key = mm[1];
          let val = mm[2] ?? "";

          if (val.trim() === "|") {
            const buf = [];
            i++;
            while (i < lines.length) {
              const L = lines[i];
              if (/^[A-Za-z0-9_]+:\s*/.test(L) && !/^\s+/.test(L)) {
                i--;
                break;
              }
              buf.push(L.replace(/^\s{2}/, ""));
              i++;
            }
            fm[key] = buf.join("\n");
            continue;
          }

          val = val.trim();
          if (
            (val.startsWith('"') && val.endsWith('"')) ||
            (val.startsWith("'") && val.endsWith("'"))
          ) {
            val = val.slice(1, -1);
          }
          fm[key] = val;
        }

        return { fm, body };
      }

      function findUpdatedAtFromBody(body) {
        const m = String(body ?? "").match(
          /最終更新\s*[:：]\s*(\d{4}-\d{2}-\d{2})/,
        );
        return m ? m[1] : "";
      }

      function mdToHtml(md) {
        if (window.marked && typeof window.marked.parse === "function") {
          return window.marked.parse(md, { breaks: true, gfm: true });
        }

        const safe = escapeHtml(md)
          .replace(/^###\s+(.+)$/gm, "<h3>$1</h3>")
          .replace(/^##\s+(.+)$/gm, "<h2>$1</h2>")
          .replace(/^#\s+(.+)$/gm, "<h1>$1</h1>")
          .replace(/\n{2,}/g, "</p><p>")
          .replace(/\n/g, "<br>");

        return "<p>" + safe + "</p>";
      }

      let entries = [];
      let filtered = [];
      let sortKey = "fileName";
      let sortDir = "asc";
      let selectedIndex = -1;
      let rawWrap = true;

      async function readFiles(fileList) {
        const files = Array.from(fileList || []).filter((f) =>
          /\.md$/i.test(f.name),
        );

        const reads = files.map(
          (f) =>
            new Promise((resolve, reject) => {
              const r = new FileReader();
              r.onload = () =>
                resolve({ file: f, text: String(r.result ?? "") });
              r.onerror = () => reject(r.error);
              r.readAsText(f, "utf-8");
            }),
        );

        return Promise.all(reads);
      }

      function buildEntry(file, mdText) {
        const relativePath =
          file?.webkitRelativePath || file?.name || "unknown.md";
        const fileName = relativePath;

        const { fm, body } = parseFrontMatter(mdText);

        const createdBy = fm?.createdBy || fm?.creator || fm?.created_by || "";
        const createdAt = fm?.createdAt || fm?.created_at || "";
        const updatedAt =
          fm?.updatedAt || fm?.updated_at || findUpdatedAtFromBody(body) || "";

        const hay = [
          fileName,
          createdBy,
          createdAt,
          updatedAt,
          fm?.fileBase || "",
          fm?.pmid || "",
          fm?.paperTitle || "",
          fm?.journal || "",
          body,
        ]
          .join("\n")
          .toLowerCase();

        return {
          fileName,
          createdBy: createdBy || "—",
          createdAt: createdAt || "—",
          updatedAt: updatedAt || "—",
          fm: fm || {},
          body,
          raw: String(mdText ?? ""),
          hay,
        };
      }

      function compareByKey(a, b, key, dir) {
        const mul = dir === "asc" ? 1 : -1;
        const av = a[key] ?? "";
        const bv = b[key] ?? "";

        if (key === "createdAt" || key === "updatedAt") {
          const an = dateToNumber(av);
          const bn = dateToNumber(bv);
          if (!Number.isNaN(an) && !Number.isNaN(bn)) return (an - bn) * mul;
          if (Number.isNaN(an) && !Number.isNaN(bn)) return 1 * mul;
          if (!Number.isNaN(an) && Number.isNaN(bn)) return -1 * mul;
        }

        return String(av).localeCompare(String(bv), "ja") * mul;
      }

      function clearSortIcons() {
        ["fileName", "createdBy", "createdAt", "updatedAt"].forEach((k) => {
          const el = $("sort-" + k);
          if (el) el.textContent = "";
        });
      }

      function setSortIcon() {
        const el = $("sort-" + sortKey);
        if (el) el.textContent = sortDir === "asc" ? "▲" : "▼";
      }

      function updateCount() {
        const total = entries.length;
        const shown = filtered.length;
        $("countPill").textContent = `${shown}/${total} files`;
      }

      function renderTable() {
        const tb = $("tbody");

        if (!filtered.length) {
          tb.innerHTML = `
            <tr>
              <td colspan="4" class="empty">
                該当する md がありません。
              </td>
            </tr>
          `;
          clearSortIcons();
          setSortIcon();
          return;
        }

        tb.innerHTML = filtered
          .map((e, idx) => {
            const active = idx === selectedIndex ? "active" : "";
            return `
              <tr class="${active}" data-idx="${idx}">
                <td class="mono">${escapeHtml(e.fileName)}</td>
                <td>${escapeHtml(e.createdBy)}</td>
                <td class="mono">${escapeHtml(e.createdAt)}</td>
                <td class="mono">${escapeHtml(e.updatedAt)}</td>
              </tr>
            `;
          })
          .join("");

        tb.querySelectorAll("tr[data-idx]").forEach((tr) => {
          tr.addEventListener("click", () => {
            selectedIndex = Number(tr.dataset.idx);
            renderTable();
            renderDetail(filtered[selectedIndex]);
          });
        });

        clearSortIcons();
        setSortIcon();
      }

      function applyFilterSort() {
        const q = $("q").value.trim().toLowerCase();
        let arr = entries.slice();

        if (q) {
          arr = arr.filter((e) => e.hay.includes(q));
        }

        arr.sort((a, b) => compareByKey(a, b, sortKey, sortDir));
        filtered = arr;
        renderTable();
        updateCount();

        if (selectedIndex >= filtered.length) {
          selectedIndex = -1;
          renderDetail(null);
        }
      }

      function setTab(mode) {
        const rendered = $("renderedView");
        const raw = $("rawView");
        const tabR = $("tabRendered");
        const tabRaw = $("tabRaw");

        if (mode === "raw") {
          rendered.style.display = "none";
          raw.style.display = "block";
          tabR.classList.remove("active");
          tabRaw.classList.add("active");
          $("wrapToggleBtn").style.display = "inline-block";
        } else {
          rendered.style.display = "block";
          raw.style.display = "none";
          tabRaw.classList.remove("active");
          tabR.classList.add("active");
          $("wrapToggleBtn").style.display = "none";
        }
      }

      function renderDetail(entry) {
        if (!entry) {
          $("selectedPill").textContent = "未選択";
          $("m_fileName").textContent = "—";
          $("m_createdBy").textContent = "—";
          $("m_createdAt").textContent = "—";
          $("m_updatedAt").textContent = "—";
          $("renderedView").innerHTML = "";
          $("rawView").textContent = "";
          setTab("rendered");
          return;
        }

        $("selectedPill").textContent = entry.fileName;
        $("m_fileName").textContent = entry.fileName;
        $("m_createdBy").textContent = entry.createdBy;
        $("m_createdAt").textContent = entry.createdAt;
        $("m_updatedAt").textContent = entry.updatedAt;
        $("renderedView").innerHTML = mdToHtml(entry.body);
        $("rawView").textContent = entry.raw;
        setTab("rendered");
      }

      function getFolderName(files) {
        if (!files || !files.length) return "";
        const path = files[0].webkitRelativePath || "";
        if (!path) return "";
        return path.split("/")[0] || "";
      }

      async function loadFolder(files) {
        if (!files || !files.length) {
          alert("フォルダを選択してください。");
          return;
        }

        try {
          const folder = getFolderName(files);
          $("folderName").textContent = folder || "フォルダ名不明";

          const items = await readFiles(files);

          if (!items.length) {
            entries = [];
            filtered = [];
            selectedIndex = -1;
            $("tbody").innerHTML = `
              <tr>
                <td colspan="4" class="empty">
                  選択したフォルダ内に .md ファイルがありません。
                </td>
              </tr>
            `;
            $("countPill").textContent = "0 files";
            renderDetail(null);
            return;
          }

          entries = items.map((x) => buildEntry(x.file, x.text));
          sortKey = "fileName";
          sortDir = "asc";
          selectedIndex = -1;
          applyFilterSort();

          if (filtered.length > 0) {
            selectedIndex = 0;
            renderTable();
            renderDetail(filtered[0]);
          } else {
            renderDetail(null);
          }
        } catch (err) {
          console.error(err);
          alert("読み込み中にエラーが発生しました。");
        }
      }

      $("folderBtn").addEventListener("click", () => {
        $("folderInput").click();
      });

      $("folderInput").addEventListener("change", async (e) => {
        await loadFolder(e.target.files);
      });

      $("clearBtn").addEventListener("click", () => {
        $("folderInput").value = "";
        $("folderName").textContent = "未選択";
        $("q").value = "";
        entries = [];
        filtered = [];
        selectedIndex = -1;
        $("tbody").innerHTML = `
          <tr>
            <td colspan="4" class="empty">
              「フォルダを選択」を押して、md を含むフォルダを選んでください。
            </td>
          </tr>
        `;
        $("countPill").textContent = "0 files";
        renderDetail(null);
      });

      $("q").addEventListener("input", applyFilterSort);

      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (key === sortKey) {
            sortDir = sortDir === "asc" ? "desc" : "asc";
          } else {
            sortKey = key;
            sortDir = "asc";
          }
          applyFilterSort();
        });
      });

      $("tabRendered").addEventListener("click", () => setTab("rendered"));
      $("tabRaw").addEventListener("click", () => setTab("raw"));

      $("wrapToggleBtn").addEventListener("click", () => {
        rawWrap = !rawWrap;
        $("wrapToggleBtn").textContent = rawWrap
          ? "RAW折り返し：ON"
          : "RAW折り返し：OFF";
        $("rawView").classList.toggle("nowrap", !rawWrap);
      });

      $("copyRawBtn").addEventListener("click", async () => {
        const t = $("rawView").textContent || "";
        if (!t) {
          alert("RAWがありません。");
          return;
        }
        await navigator.clipboard.writeText(t);
      });

      $("copyHtmlBtn").addEventListener("click", async () => {
        const html = $("renderedView").innerHTML || "";
        if (!html) {
          alert("HTMLがありません。");
          return;
        }
        await navigator.clipboard.writeText(html);
      });

      (function setupSplitter() {
        const wrap = $("wrap");
        const splitter = $("splitter");
        if (!wrap || !splitter) return;

        let dragging = false;

        splitter.addEventListener("mousedown", (e) => {
          dragging = true;
          document.body.style.userSelect = "none";
          e.preventDefault();
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const rect = wrap.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const minLeft = 260;
          const minRight = 360;
          const total = rect.width;

          const left = Math.max(minLeft, Math.min(x, total - minRight));
          const right = total - left - 10;
          wrap.style.gridTemplateColumns = `${left}px 10px ${right}px`;
        });

        window.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          document.body.style.userSelect = "";
        });
      })();
    </script>
  </body>
</html>
